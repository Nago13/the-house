<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Golden background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="#F5C842"/>

  <!-- Chimney (drawn before roof so roof covers its bottom) -->
  <rect x="63" y="25" width="11" height="28" rx="1.5" fill="#1C1B2E"/>

  <!-- House body -->
  <rect x="17" y="50" width="66" height="38" rx="2" fill="#1C1B2E"/>

  <!-- Roof — two thick strokes forming inverted V peak -->
  <polyline
    points="7,55 50,17 93,55"
    fill="none"
    stroke="#1C1B2E"
    stroke-width="9.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Window with glow -->
  <rect x="40" y="58" width="20" height="22" rx="3" fill="#FFD700" filter="url(#glow)"/>
</svg>
